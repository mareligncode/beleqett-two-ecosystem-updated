databases:
  - name: beleqet-postgres
    plan: free
    region: oregon
    databaseName: beleqet
    user: beleqet

services:
  - type: keyvalue
    name: beleqet-redis
    plan: free
    region: oregon
    maxmemoryPolicy: noeviction
    ipAllowList: []

  - type: web
    name: beleqet-backend
    runtime: docker
    plan: free
    region: oregon
    rootDir: backend
    dockerfilePath: ./Dockerfile
    dockerContext: .
    autoDeploy: true
    healthCheckPath: /api/v1/jobs/categories
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: beleqet-postgres
          property: connectionString
      - key: FRONTEND_URL
        value: https://beleqet-frontend.onrender.com
      - key: REDIS_HOST
        fromService:
          name: beleqet-redis
          type: keyvalue
          property: host
      - key: REDIS_PORT
        fromService:
          name: beleqet-redis
          type: keyvalue
          property: port
      - key: REDIS_PASSWORD
        fromService:
          name: beleqet-redis
          type: keyvalue
          property: password
      - key: REDIS_TLS
        value: "false"
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_ACCESS_EXPIRES
        value: 15m
      - key: JWT_REFRESH_EXPIRES
        value: 30d
      - key: SWAGGER_ENABLED
        value: "false"
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: ADMIN_FIRST_NAME
        value: Platform
      - key: ADMIN_LAST_NAME
        value: Admin
      - key: SMTP_HOST
        value: in-v3.mailjet.com
      - key: SMTP_PORT
        value: "2525"
      - key: SMTP_SECURE
        value: "false"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: SMTP_FROM
        sync: false
      - key: R2_ACCOUNT_ID
        sync: false
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false
      - key: R2_BUCKET_NAME
        sync: false
      - key: R2_PUBLIC_BASE_URL
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4o-mini
      - key: CHAPA_SECRET_KEY
        sync: false
      - key: CHAPA_WEBHOOK_SECRET
        sync: false
      - key: CHAPA_CALLBACK_URL
        value: https://beleqet-backend.onrender.com/api/v1/escrow/callback
      - key: CHAPA_RETURN_URL
        value: https://beleqet-frontend.onrender.com/freelance/payment-success

  - type: web
    name: beleqet-frontend
    runtime: node
    plan: free
    region: oregon
    rootDir: beleqet-jobs-nextjs
    buildCommand: npm ci && npm run build
    startCommand: npm start
    autoDeploy: true
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_API_URL
        value: https://beleqet-backend.onrender.com/api/v1
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL
        value: llama-3.1-8b-instant
